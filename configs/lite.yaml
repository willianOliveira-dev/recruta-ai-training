model:
  name_or_path: "unsloth/DeepSeek-R1-Distill-Qwen-14B"
  load_in_4bit: true

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  max_seq_length: 1024
  num_train_epochs: 3

peft:
  r: 8
  lora_alpha: 16

data:
  sources:
    - name: "ner-bert"
      source_type: "huggingface"
      uri: "yashpwr/resume-ner-training-data"
    - name: "ats-score"
      source_type: "huggingface"
      uri: "0xnbk/resume-ats-score-v1-en"
    - name: "resume-json-extraction"
      source_type: "huggingface"
      uri: "sandeeppanem/resume-json-extraction-5k"
    - name: "resumes-corpus"
      source_type: "huggingface"
      uri: "datasetmaster/resumes"
    - name: "resume-jd-match"
      source_type: "huggingface"
      uri: "facehuggerapoorv/resume-jd-match"
    - name: "linkedin-job-listings"
      source_type: "huggingface"
      uri: "datastax/linkedin_job_listings"

wandb:
  enabled: true
  name: "recruta-lite-run-1"

publish:
  enabled: false
  repo_id: "willian-oliv/recruta-1.0-ats-lite-14b"
  merge_before_push: true
