project_name: "recruta-ai-micro"
seed: 42
output_dir: "./outputs/micro"

model:
  name_or_path: "unsloth/Llama-3.2-3B-Instruct"
  load_in_4bit: true

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  max_seq_length: 2048
  max_steps: 60
  learning_rate: 2.0e-4
  weight_decay: 0.01
  optim: "adamw_8bit"
  lr_scheduler_type: "cosine"
  warmup_steps: 10

peft:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

publish:
  enabled: false
  repo_id: "seu-usuario/recruta-ats-micro-3b-gguf"
  push_gguf: true
  gguf_quantization: "q4_k_m"
  token_env_var: "HF_TOKEN"
